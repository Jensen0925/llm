services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: repo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: llm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init/01-enable-pgvector.sql:/docker-entrypoint-initdb.d/01-enable-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: repo-api
    env_file:
      - ../../services/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/llm?sslmode=disable
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: Dockerfile.web
    container_name: repo-web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
