llm:
  provider: openai
  model: glm-5.1
  maxTokens: 512
  timeout: 30000
  streaming: false
  modelKwargs:
    chat_template_kwargs:
      enable_thinking: false
    thinking:
      type: disabled
retrieval:
  enabled: false
  topK: 5
tools:
  enabled: false
  names: []
features:
  invoke: true
  stream: true
  batch: true
  batchSize: 3
